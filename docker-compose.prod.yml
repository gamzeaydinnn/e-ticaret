services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sql-prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD:-ECom1234}
      - MSSQL_PID=Express
    ports:
      - "${DB_PORT:-1435}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./backups:/backups
    networks:
      - ecommerce-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $${DB_PASSWORD:-ECom1234} -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mikro-vpn:
    image: qmcgaw/gluetun:latest
    container_name: mikro-vpn
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=${TZ:-Europe/Istanbul}
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=openvpn
      - OPENVPN_CUSTOM_CONFIG=/gluetun/custom.conf
      - FIREWALL_INPUT_PORTS=${MIKRO_API_RELAY_PORT:-8084},${MIKRO_SQL_RELAY_PORT:-1433}
      - LOG_LEVEL=info
    volumes:
      - ${VPN_CONFIG_PATH:-./vpn.ovpn}:/gluetun/custom.conf:ro
    networks:
      - ecommerce-network

  mikro-api-relay:
    build:
      context: .
      dockerfile: deploy/mikro-relay/Dockerfile
    container_name: mikro-api-relay
    restart: always
    network_mode: "service:mikro-vpn"
    depends_on:
      mikro-vpn:
        condition: service_started
    environment:
      - RELAY_LISTEN_PORT=${MIKRO_API_RELAY_PORT:-8084}
      - RELAY_TARGET_HOST=${MIKRO_API_TARGET_HOST:-10.0.0.3}
      - RELAY_TARGET_PORT=${MIKRO_API_TARGET_PORT:-8084}

  mikro-sql-relay:
    build:
      context: .
      dockerfile: deploy/mikro-relay/Dockerfile
    container_name: mikro-sql-relay
    restart: always
    network_mode: "service:mikro-vpn"
    depends_on:
      mikro-vpn:
        condition: service_started
    environment:
      - RELAY_LISTEN_PORT=${MIKRO_SQL_RELAY_PORT:-1433}
      - RELAY_TARGET_HOST=${MIKRO_SQL_TARGET_HOST:-10.0.0.3}
      - RELAY_TARGET_PORT=${MIKRO_SQL_TARGET_PORT:-1433}

  api:
    build:
      context: ./src
      dockerfile: ECommerce.API/Dockerfile
    container_name: ecommerce-api-prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=${APP_DB_NAME:-ECommerceDb};User Id=sa;Password=${DB_PASSWORD:-CHANGE_ME};TrustServerCertificate=True;
      - Jwt__Key=${JWT_SECRET:-CHANGE_ME}
      - Jwt__Issuer=${JWT_ISSUER:-ECommerceAPI}
      - Jwt__Audience=${JWT_AUDIENCE:-ECommerceClient}
      # ====== MÄ°KRO ERP ENTEGRASYON AYARLARI ======
      # Mikro HTTP ve Mikro SQL trafiÄźi mikro-vpn sidecar ĂĽstĂĽnden tĂĽnellenir.
      - MikroSettings__ApiUrl=https://mikro-vpn:${MIKRO_API_RELAY_PORT:-8084}
      - MikroSettings__ApiKey=${MIKRO_API_KEY:-CHANGE_ME}
      - MikroSettings__FirmaKodu=${MIKRO_FIRMA_KODU:-CHANGE_ME}
      - MikroSettings__KullaniciKodu=${MIKRO_KULLANICI_KODU:-CHANGE_ME}
      - MikroSettings__Sifre=${MIKRO_SIFRE:-CHANGE_ME}
      - MikroSettings__CalismaYili=${MIKRO_CALISMA_YILI:-2026}
      - MikroSettings__DefaultDepoNo=${MIKRO_DEFAULT_DEPO_NO:-1}
      - MikroSettings__DefaultSubeNo=${MIKRO_DEFAULT_SUBE_NO:-0}
      - MikroSettings__DefaultFirmaNo=${MIKRO_DEFAULT_FIRMA_NO:-0}
      - MikroSettings__DefaultEvrakSeri=${MIKRO_DEFAULT_EVRAK_SERI:-E}
      - MikroSettings__StokSyncIntervalMinutes=${MIKRO_STOK_SYNC_INTERVAL_MINUTES:-15}
      - MikroSettings__FiyatSyncIntervalMinutes=${MIKRO_FIYAT_SYNC_INTERVAL_MINUTES:-60}
      - MikroSettings__MaxRetryAttempts=${MIKRO_MAX_RETRY_ATTEMPTS:-3}
      - MikroSettings__RequestTimeoutSeconds=${MIKRO_REQUEST_TIMEOUT_SECONDS:-120}
      - MikroSettings__IgnoreSslErrors=${MIKRO_IGNORE_SSL_ERRORS:-true}
      - "MikroSettings__SqlConnectionString=Server=mikro-vpn,${MIKRO_SQL_RELAY_PORT:-1433};Database=${MIKRO_SQL_DATABASE:-MikroDB_V16_2023};User Id=${MIKRO_SQL_USER:-CHANGE_ME};Password=${MIKRO_SQL_PASSWORD:-CHANGE_ME};TrustServerCertificate=True;Connect Timeout=10;"
      - MikroSettings__SqlCommandTimeoutSeconds=${MIKRO_SQL_COMMAND_TIMEOUT_SECONDS:-30}
      - MikroSettings__OnlineMusteriPrefix=${MIKRO_ONLINE_MUSTERI_PREFIX:-WEB-}
      # ====== MÄ°KRO SYNC JOB AYARLARI (HANGFIRE) ======
      - MikroSync__JobsEnabled=${MIKRO_SYNC_JOBS_ENABLED:-true}
      - MikroSync__StockSyncCron=${MIKRO_SYNC_STOCK_CRON:-*/15 * * * *}
      - MikroSync__PriceSyncCron=${MIKRO_SYNC_PRICE_CRON:-0 * * * *}
      - MikroSync__FullSyncCron=${MIKRO_SYNC_FULL_CRON:-0 6 * * *}
      - MikroSync__OrderPushCron=${MIKRO_SYNC_ORDER_PUSH_CRON:-*/5 * * * *}
      - MikroSync__MaxRetryAttempts=${MIKRO_SYNC_MAX_RETRY_ATTEMPTS:-3}
      - MikroSync__BatchSize=${MIKRO_SYNC_BATCH_SIZE:-100}
      - MikroSync__DashboardPath=${MIKRO_SYNC_DASHBOARD_PATH:-/hangfire}
      # ====== NetGSM SMS Configuration ======
      - NetGsm__UserCode=${NETGSM_USERCODE:-CHANGE_ME}
      - NetGsm__Password=${NETGSM_PASSWORD:-CHANGE_ME}
      - NetGsm__MsgHeader=${NETGSM_MSGHEADER:-CHANGE_ME}
      - NetGsm__AppName=${NETGSM_APPNAME:-E-Ticaret}
      - NetGsm__ApiUrl=${NETGSM_APIURL:-https://api.netgsm.com.tr/sms/rest/v2}
      - NetGsm__Enabled=${NETGSM_ENABLED:-true}
      - NetGsm__UseMockService=${NETGSM_USEMOCKSERVICE:-false}
      # SMS Verification Settings
      - SmsVerification__ExpirationSeconds=180
      - SmsVerification__ResendCooldownSeconds=60
      - SmsVerification__DailyMaxOtpCount=5
      - SmsVerification__HourlyMaxOtpCount=3
      - SmsVerification__MaxWrongAttempts=3
      - SmsVerification__CodeLength=6
      - SmsVerification__AppName=${SMS_APP_NAME:-E-Ticaret}
      # POSNET Enabled Flag - POSNET servislerinin kaydedilmesi iĂ§in gerekli!
      - Payment__Posnet__Enabled=${PAYMENT_POSNET_ENABLED:-true}
      # POSNET Configuration (YapÄ± Kredi 3D Secure)
      - PaymentSettings__PosnetMerchantId=${POSNET_MERCHANT_ID:-CHANGE_ME}
      - PaymentSettings__PosnetTerminalId=${POSNET_TERMINAL_ID:-CHANGE_ME}
      - PaymentSettings__PosnetId=${POSNET_ID:-CHANGE_ME}
      - PaymentSettings__PosnetEncKey=${POSNET_ENC_KEY:-CHANGE_ME}
      - PaymentSettings__PosnetXmlServiceUrl=${POSNET_XML_SERVICE_URL:-https://posnet.yapikredi.com.tr/PosnetWebService/XML}
      - PaymentSettings__Posnet3DServiceUrl=${POSNET_3D_SERVICE_URL:-https://posnet.yapikredi.com.tr/3DSWebService/YKBPaymentService}
      - PaymentSettings__PosnetCallbackUrl=${POSNET_CALLBACK_URL:-https://golkoygurme.com.tr/api/payments/posnet/3d-callback}
      - PaymentSettings__ReturnUrlSuccess=${PAYMENT_RETURN_URL_SUCCESS:-https://golkoygurme.com.tr/checkout/success}
      - PaymentSettings__ReturnUrlCancel=${PAYMENT_RETURN_URL_CANCEL:-https://golkoygurme.com.tr/checkout/cancel}
      - PaymentSettings__IyzicoCallbackUrl=${IYZICO_CALLBACK_URL:-https://golkoygurme.com.tr/api/payments/iyzico/callback}
      - AppSettings__BaseUrl=${APP_BASE_URL:-https://golkoygurme.com.tr}
      - PaymentSettings__PosnetIsTestEnvironment=${POSNET_IS_TEST_ENVIRONMENT:-false}
      - PaymentSettings__PosnetTimeoutSeconds=${POSNET_TIMEOUT_SECONDS:-60}
      - PaymentSettings__PosnetWorldPointEnabled=${POSNET_WORLDPOINT_ENABLED:-true}
      # CORS Configuration for production
      - Cors__AllowedOrigins__0=https://golkoygurme.com.tr
      - Cors__AllowedOrigins__1=https://www.golkoygurme.com.tr
      - Cors__AllowedOrigins__2=http://golkoygurme.com.tr
      - Cors__AllowedOrigins__3=http://www.golkoygurme.com.tr
      - Cors__AllowedOrigins__4=http://localhost:3000
    depends_on:
      sqlserver:
        condition: service_healthy
      mikro-vpn:
        condition: service_started
      mikro-api-relay:
        condition: service_started
      mikro-sql-relay:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Sunucuda nginx proxy /api â†’ backend yĂ¶nlendirir
        # Frontend'de zaten /api prefix var, tekrar eklenmemeli (double /api/api Ă¶nlenir)
        - REACT_APP_API_URL=
        - REACT_APP_BACKEND_ENABLED=true
        - REACT_APP_USE_MOCK_DATA=false
        - API_HOST=ecommerce-api-prod
    image: ecommerce-frontend:latest
    container_name: ecommerce-frontend-prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - ecommerce-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:80/",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  sqlserver-data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
